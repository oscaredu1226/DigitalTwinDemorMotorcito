<div class="viewer-wrapper">
  <div class="viewer-container" #viewerContainer></div>

  <div class="floating-metrics">
    <div class="metric-pill" [class.warning]="temperature > 80">
      <span>Temperatura</span>
      <strong>{{ temperature | number:'1.1-1' }} °C</strong>
    </div>

    <div class="metric-pill" [class.warning]="vibration > 3">
      <span>Vibración</span>
      <strong>{{ vibration | number:'1.1-2' }} g</strong>
    </div>

    <div class="metric-pill">
      <span>RPM</span>
      <strong>{{ rpm | number:'1.0-0' }}</strong>
    </div>
  </div>
</div>
