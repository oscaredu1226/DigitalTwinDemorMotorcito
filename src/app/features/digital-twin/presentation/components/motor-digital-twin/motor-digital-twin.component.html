<article class="digital-twin-card" [ngClass]="statusClass">
  <div class="section-header">
    <p>Representación virtual 3D</p>
    <h2>Digital Twin del motor</h2>
  </div>

  <app-motor-3d-viewer
    [status]="motor.twinState.status"
  />

  <div class="status-strip" [ngClass]="statusClass">
    <span class="status-dot"></span>
    <span>{{ statusLabel }}</span>
  </div>

  <div class="motor-info">
    <div>
      <span>ID del equipo</span>
      <strong>{{ motor.deviceId }}</strong>
    </div>

    <div>
      <span>Estado actual</span>
      <strong>{{ statusLabel }}</strong>
    </div>

    <div>
      <span>Última lectura</span>
      <strong>{{ motor.timestamp | date:'short' }}</strong>
    </div>
  </div>
</article>
